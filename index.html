<meta name="description" content="Catalogo antiquario di Paolo Mencarini: libri rari, prime edizioni, D'Annunzio, Luigi Servolini, xilografia italiana, fascismo, Risorgimento, Napoleone.">
<meta name="keywords" content="libri antichi, antiquariato, D'Annunzio, Luigi Servolini, xilografia, prima edizione, collezione, Mencarini, libri rari">
<link rel="canonical" href="https://menkthecollector.netlify.app/">
<meta property="og:title" content="Catalogo Libri — Paolo Mencarini">
<meta property="og:description" content="Collezione personale di libri rari e prime edizioni. D'Annunzio, Servolini, xilografia, fascismo, Risorgimento.">
<meta property="og:url" content="https://menkthecollector.netlify.app/">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1a1208; --parchment:#f5edd8; --parchment-dark:#ede0c4; --gold:#b8860b; --rust:#8b3a1a; --shadow:rgba(26,18,8,0.15); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--parchment); color:var(--ink); font-family:'EB Garamond',Georgia,serif; font-size:16px; line-height:1.6; min-height:100vh; }
  header{ text-align:center; padding:56px 40px 36px; border-bottom:2px solid var(--gold); background:linear-gradient(180deg,#efe3c5 0%,var(--parchment) 100%); }
  header::after{ content:'✦ ✦ ✦'; display:block; color:var(--gold); font-size:11px; letter-spacing:8px; margin-top:14px; }
  h1{ font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.2rem); font-weight:400; color:var(--ink); }
  h1 em{ font-style:italic; color:var(--rust); }
  .subtitle{ font-size:0.85rem; color:var(--gold); letter-spacing:0.22em; text-transform:uppercase; margin-top:8px; }
  .exlibris{ display:block; margin:18px auto 0; width:110px; opacity:0.92; }
  .controls{ display:flex; gap:12px; align-items:center; padding:20px 40px; background:var(--parchment-dark); border-bottom:1px solid rgba(184,134,11,0.3); flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .search-wrap{ flex:1; min-width:180px; position:relative; }
  .search-wrap::before{ content:'⌕'; position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--gold); font-size:18px; }
  input[type=search]{ width:100%; padding:9px 16px 9px 36px; border:1px solid rgba(184,134,11,0.4); border-radius:2px; background:rgba(245,237,216,0.9); font-family:'EB Garamond',serif; font-size:15px; color:var(--ink); outline:none; }
  input[type=search]:focus{ border-color:var(--gold); background:white; }
  select{ padding:9px 14px; border:1px solid rgba(184,134,11,0.4); border-radius:2px; background:rgba(245,237,216,0.9); font-family:'EB Garamond',serif; font-size:15px; color:var(--ink); outline:none; cursor:pointer; }
  .count{ font-size:13px; color:var(--gold); letter-spacing:0.05em; font-style:italic; white-space:nowrap; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:32px; padding:40px; }
  .card{ background:white; border:1px solid rgba(184,134,11,0.2); box-shadow:0 4px 20px var(--shadow); transition:transform .3s,box-shadow .3s; animation:fadeUp .5s ease both; overflow:hidden; }
  .card:hover{ transform:translateY(-4px); box-shadow:0 14px 40px var(--shadow); }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .photo-main{ width:100%; background:#ede5d0; cursor:zoom-in; overflow:hidden; }
  .photo-main img{ width:100%; height:300px; object-fit:contain; display:block; transition:transform .3s; }
  .photo-main:hover img{ transform:scale(1.03); }
  .photo-thumbs{ display:flex; background:#e8ddc8; border-top:1px solid rgba(184,134,11,0.2); }
  .p-thumb{ flex:1; overflow:hidden; cursor:zoom-in; border-right:1px solid rgba(184,134,11,0.15); }
  .p-thumb:last-child{ border-right:none; }
  .p-thumb img{ width:100%; height:150px; object-fit:cover; display:block; background:#e8ddc8; transition:transform .3s; }
  .p-thumb:hover img{ transform:scale(1.06); }
  .card-body{ padding:18px 20px 16px; }
  .card-num{ font-size:11px; letter-spacing:0.15em; color:var(--gold); text-transform:uppercase; margin-bottom:5px; }
  .card-title{ font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; line-height:1.3; margin-bottom:3px; }
  .card-title a{ color:inherit; text-decoration:none; border-bottom:1px dotted var(--gold); }
  .card-title a:hover{ color:var(--rust); }
  a.card-link{ text-decoration:none; color:inherit; display:block; }
  a.card-link .card:hover{ transform:translateY(-4px); box-shadow:0 14px 40px var(--shadow); }
  .card-author{ font-style:italic; color:var(--rust); font-size:0.93rem; margin-bottom:13px; }
  .meta-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; font-size:13px; border-top:1px solid var(--parchment-dark); padding-top:11px; }
  .meta-item{ display:flex; flex-direction:column; gap:1px; }
  .meta-label{ font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }
  .badge{ display:inline-block; padding:2px 7px; font-size:11px; letter-spacing:0.06em; border-radius:1px; }
  .badge-ottimo{ background:#d4edda; color:#155724; }
  .badge-buono{ background:#d1ecf1; color:#0c5460; }
  .badge-discreto{ background:#fff3cd; color:#856404; }
  .badge-mediocre{ background:#f8d7da; color:#721c24; }
  .badge-default{ background:var(--parchment-dark); color:var(--ink); }
  .card-note{ margin-top:11px; font-size:13px; color:#5a4a35; font-style:italic; line-height:1.5; border-top:1px solid var(--parchment-dark); padding-top:9px; }
  .valore-row{ display:flex; align-items:center; gap:10px; margin-top:12px; padding-top:10px; border-top:1px solid var(--parchment-dark); }
  .valore-label{ font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }
  .valore-val{ font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--rust); font-weight:700; }
  .valore-empty{ font-style:italic; color:#aaa; font-size:13px; }
  .lightbox{ display:none; position:fixed; inset:0; background:rgba(8,5,2,0.94); z-index:9999; align-items:center; justify-content:center; cursor:zoom-out; }
  .lightbox.active{ display:flex; }
  .lightbox img{ max-width:92vw; max-height:92vh; object-fit:contain; box-shadow:0 0 80px rgba(0,0,0,0.8); }
  .lb-close{ position:fixed; top:22px; right:30px; color:rgba(255,255,255,0.6); font-size:30px; cursor:pointer; }
  .no-results{ grid-column:1/-1; text-align:center; padding:80px 20px; font-style:italic; color:#8a7a60; font-size:1.2rem; }
  footer{ text-align:center; padding:28px; border-top:1px solid rgba(184,134,11,0.2); font-size:12px; color:var(--gold); letter-spacing:0.1em; }
</style>
</head>

function badgeClass(s){s=(s||'').toLowerCase();if(s.includes('ottimo'))return 'badge-ottimo';if(s.includes('buono'))return 'badge-buono';if(s.includes('discreto'))return 'badge-discreto';if(s.includes('mediocre'))return 'badge-mediocre';return 'badge-default';}
function renderPhotos(b){
  const all=[b.foto1,b.foto2,b.foto3].filter(f=>f&&PHOTOS[f]);
  if(!all.length) return '';
  const main=all[0],rest=all.slice(1);
  return `<div class="photo-main" onclick="openLightbox('${main}');event.stopPropagation()"><img src="${PHOTOS[main]}" alt="" loading="lazy"></div>`
    +(rest.length?`<div class="photo-thumbs">${rest.map(f=>`<div class="p-thumb" onclick="openLightbox('${f}');event.stopPropagation()"><img src="${PHOTOS[f]}" alt="" loading="lazy"></div>`).join('')}</div>`:'');
}
function renderCard(b,idx){
  const meta=[
    b.editore?`<div class="meta-item"><span class="meta-label">Editore</span><span class="meta-value">${b.editore}</span></div>`:'',
    b.anno?`<div class="meta-item"><span class="meta-label">Anno</span><span class="meta-value">${b.anno}</span></div>`:'',
    b.edizione?`<div class="meta-item"><span class="meta-label">Edizione</span><span class="meta-value">${b.edizione}</span></div>`:'',
    b.genere?`<div class="meta-item"><span class="meta-label">Genere</span><span class="meta-value">${b.genere}</span></div>`:'',
    b.stato?`<div class="meta-item"><span class="meta-label">Stato</span><span class="meta-value"><span class="badge ${badgeClass(b.stato)}">${b.stato}</span></span></div>`:'',
  ].join('');
  const valoreHtml=b.valore?`<div class="valore-row"><span class="valore-label">Valore stimato</span><span class="valore-val">${b.valore} €</span></div>`:`<div class="valore-row"><span class="valore-empty">Valore non ancora stimato</span></div>`;
  const inner=`<div class="card" style="animation-delay:${idx*0.04}s">${renderPhotos(b)}<div class="card-body"><div class="card-num">N° ${b.num}</div><div class="card-title">${b.titolo}</div><div class="card-author">${b.autore}</div><div class="meta-grid">${meta}</div>${b.note?`<div class="card-note">${b.note}</div>`:''}</div>${valoreHtml}</div>`;
  return b.pagina?`<a href="${b.pagina}" class="card-link">${inner}</a>`:inner;
}
function populate(){
  const fg=document.getElementById('filter-genere'),fa=document.getElementById('filter-area');
  [...new Set(books.map(b=>b.genere).filter(Boolean))].sort().forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;fg.appendChild(o);});
  [...new Set(books.map(b=>b.gruppo).filter(Boolean))].sort().forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;fa.appendChild(o);});
}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const qa=document.getElementById('search-autore').value.toLowerCase();
  const genere=document.getElementById('filter-genere').value;
  const area=document.getElementById('filter-area').value;
  const f=books.filter(b=>{
    const t=[b.titolo,b.editore,b.note].join(' ').toLowerCase();
    const autore=(b.autore||'').toLowerCase();
    return(!q||t.includes(q))&&(!qa||autore.includes(qa))&&(!genere||b.genere===genere)&&(!area||b.gruppo===area);
  });
  document.getElementById('grid').innerHTML=f.length?f.map((b,i)=>renderCard(b,i)).join(''):'<div class="no-results">Nessun libro trovato.</div>';
  document.getElementById('count').textContent=`${f.length} di ${books.length} libri`;
}
document.getElementById('search').addEventListener('input',render);
document.getElementById('search-autore').addEventListener('input',render);
document.getElementById('filter-genere').addEventListener('change',render);
document.getElementById('filter-area').addEventListener('change',render);
populate();render();
function openLightbox(fname){document.getElementById('lightbox-img').src=PHOTOS[fname];document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>
